<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Truly Untitled Inc.</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background-color: #ffffff;
      color: #000000;
      font-family: Georgia, 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .logo-wrap { margin-bottom: 36px; }
    .logo-wrap img { width: 300px; max-width: 80vw; display: block; }
    .tagline {
      font-size: 15px;
      font-weight: normal;
      letter-spacing: 0.04em;
      text-align: center;
      line-height: 1.6;
      max-width: 480px;
      color: #000000;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img src="logo.png" alt="Truly Untitled Inc." />
  </div>
  <p class="tagline">Truly Untitled — Custom Creative and Digital Strategies for artists and brands since 2010.</p>
</body>
</html>
