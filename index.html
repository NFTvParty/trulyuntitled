<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Truly Untitled Inc.</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background-color: #ffffff;
      color: #000000;
      font-family: Georgia, 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .logo-wrap { margin-bottom: 36px; }
    .logo-wrap img { width: 300px; max-width: 80vw; display: block; }
    .tagline {
      font-size: 15px;
      font-weight: normal;
      letter-spacing: 0.04em;
      text-align: center;
      line-height: 1.6;
      max-width: 480px;
      color: #000000;
    }
    .contact {
      font-size: 14px;
      font-weight: normal;
      letter-spacing: 0.04em;
      text-align: center;
      line-height: 1.6;
      max-width: 480px;
      color: #000000;
      margin-top: 16px;
    }
    .contact a {
      color: #000000;
    }
    .site-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 14px 20px;
      text-align: center;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: #aaaaaa;
    }
    .site-footer a {
      color: #aaaaaa;
      text-decoration: none;
    }
    .site-footer a:hover {
      color: #000000;
    }
    .site-footer span {
      margin: 0 0.6rem;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img src="logo.png" alt="Truly Untitled Inc." />
  </div>
  <p class="tagline">Truly Untitled &mdash; Custom Creative and Digital Strategies for artists and brands since 2010.</p>
  <p class="contact">Please send all RFPs &amp; New Client inquiries to <a href="mailto:info@trulyuntitled.com">info@trulyuntitled.com</a></p>

  <footer class="site-footer">
    <a href="/privacy-policy.html">Privacy Policy</a>
    <span>&middot;</span>
    <a href="/terms.html">Terms of Service</a>
  </footer>

</body>
</html>
